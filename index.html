<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TCM Intake Self-Assessment</title>

<style>

body{
font-family: Arial;
max-width:800px;
margin:auto;
padding:20px;
background:#f6f6f6;
}

h1,h2{
color:#2f4f4f;
}

.section{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:8px;
}

button{
padding:12px;
font-size:16px;
background:#2f4f4f;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.result{
background:#e8f5e9;
padding:20px;
margin-top:20px;
border-radius:8px;
}

</style>
</head>


<body>

<h1>TCM Health Self-Assessment</h1>

<p>
Answer the following questions to explore possible Traditional Chinese Medicine patterns.
</p>


<form id="tcmForm">

<div class="section">

<h2>Energy</h2>

<select id="energy">
<option value="">Select</option>
<option value="low">Very low</option>
<option value="crash">Energy crashes later</option>
<option value="stable">Stable energy</option>
</select>

</div>


<div class="section">

<h2>Stress / Emotional State</h2>

<select id="stress">
<option value="">Select</option>
<option value="irritable">Irritable / frustrated</option>
<option value="anxious">Anxious</option>
<option value="calm">Calm</option>
</select>

</div>


<div class="section">

<h2>Digestion</h2>

<select id="digestion">
<option value="">Select</option>
<option value="bloating">Bloating after meals</option>
<option value="loose">Loose stools</option>
<option value="normal">Normal digestion</option>
</select>

</div>


<div class="section">

<h2>Temperature Preference</h2>

<select id="temperature">
<option value="">Select</option>
<option value="cold">Often cold</option>
<option value="hot">Often hot</option>
<option value="normal">Normal</option>
</select>

</div>


<div class="section">

<h2>Sleep</h2>

<select id="sleep">
<option value="">Select</option>
<option value="13am">Wake between 1-3am</option>
<option value="insomnia">Difficulty sleeping</option>
<option value="good">Sleep well</option>
</select>

</div>


<div class="section">

<h2>Pain / Tension</h2>

<select id="pain">
<option value="">Select</option>
<option value="neck">Neck / shoulder tension</option>
<option value="headache">Headaches</option>
<option value="none">None</option>
</select>

</div>


<button type="button" onclick="analyze()">Generate TCM Pattern Insight</button>

</form>



<div id="result" class="result" style="display:none"></div>


<script>

function analyze(){

let result="";

let energy=document.getElementById("energy").value;
let stress=document.getElementById("stress").value;
let digestion=document.getElementById("digestion").value;
let temperature=document.getElementById("temperature").value;
let sleep=document.getElementById("sleep").value;
let pain=document.getElementById("pain").value;


/* Liver Qi Stagnation */

if(
(stress==="irritable") &&
(pain==="neck" || sleep==="13am")
){

result+=`
<h2>Possible Pattern: Liver Qi Stagnation</h2>

Common signs include stress, irritability, neck tension, and symptoms worsening during emotional strain.

<h3>Example acupuncture points</h3>
<ul>
<li>LV3 – Taichong</li>
<li>LI4 – Hegu</li>
<li>GB34 – Yanglingquan</li>
<li>PC6 – Neiguan</li>
</ul>
`;

}


/* Spleen Qi Deficiency */

if(
(energy==="low" || energy==="crash") &&
(digestion==="bloating" || digestion==="loose")
){

result+=`
<h2>Possible Pattern: Spleen Qi Deficiency</h2>

This pattern may present with fatigue, digestive weakness, and low energy after eating.

<h3>Example acupuncture points</h3>
<ul>
<li>ST36 – Zusanli</li>
<li>SP6 – Sanyinjiao</li>
<li>CV12 – Zhongwan</li>
<li>BL20 – Pishu</li>
</ul>
`;

}


/* Kidney Yang Deficiency */

if(
temperature==="cold" && energy==="low"
){

result+=`
<h2>Possible Pattern: Kidney Yang Deficiency</h2>

Common indicators include feeling cold frequently, fatigue, and low vitality.

<h3>Example acupuncture points</h3>
<ul>
<li>KD3 – Taixi</li>
<li>BL23 – Shenshu</li>
<li>CV4 – Guanyuan</li>
<li>DU4 – Mingmen</li>
</ul>
`;

}


/* default */

if(result===""){
result="<h2>No strong pattern detected.</h2><p>Further clinical assessment is recommended.</p>";
}


/* disclaimer */

result+=`

<hr>

<p style="font-size:14px;color:#555">

These impressions are generated automatically based on the answers you provided and are intended for educational purposes only.

They do not constitute a medical diagnosis or treatment plan.

Traditional Chinese Medicine diagnosis requires in-person evaluation including tongue observation, pulse palpation, and clinical assessment by a licensed acupuncture or TCM practitioner.

Please schedule an appointment for a comprehensive consultation and personalized acupuncture treatment plan.

</p>

`;


document.getElementById("result").innerHTML=result;
document.getElementById("result").style.display="block";

}

</script>

</body>
</html>
