<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CHORDS & CHI – TCM Intake</title>

<style>

body{
font-family:Arial;
max-width:950px;
margin:auto;
padding:20px;
background:#f4f4f4;
}

.section{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:8px;
}

input,select,textarea{
width:100%;
padding:8px;
margin-bottom:15px;
}

button{
padding:12px;
font-size:16px;
background:#2c4c4c;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.result{
background:#e8f5e9;
padding:20px;
margin-top:20px;
border-radius:8px;
}

</style>
</head>

<body>

<h1>CHORDS & CHI – Acupuncture Intake</h1>

<form>

<div class="section">

<h2>Patient Information</h2>

Email Address
<input id="email">

Name
<input id="name">

Date of Birth
<input id="dob">

Primary Contact
<input id="contact">

Address
<textarea id="address"></textarea>

Gender
<input id="gender">

Occupation
<input id="occupation">

</div>

<div class="section">

<h2>Main Health Concern</h2>

<textarea id="concern"></textarea>

</div>

<div class="section">

<h2>Temperature Pattern</h2>

<select id="temperature">
<option value="">Select</option>
<option>Often cold</option>
<option>Cold hands and feet</option>
<option>Often hot</option>
<option>Alternating hot and cold</option>
<option>Night sweats</option>
<option>Normal</option>
</select>

</div>

<div class="section">

<h2>Energy Level</h2>

<select id="energy">
<option>Strong</option>
<option>Low energy</option>
<option>Energy crashes afternoon</option>
<option>Fatigue after eating</option>
<option>Very weak</option>
</select>

</div>

<div class="section">

<h2>Appetite</h2>

<select id="appetite">
<option>Poor appetite</option>
<option>Normal appetite</option>
<option>Strong appetite</option>
<option>Hungry but cannot eat much</option>
</select>

</div>

<div class="section">

<h2>Bloating After Meals</h2>

<select id="bloating">
<option>No</option>
<option>Sometimes</option>
<option>Often</option>
<option>Severe</option>
</select>

</div>

<div class="section">

<h2>Bowel Movements</h2>

<select id="bowel">
<option>Normal</option>
<option>Loose stools</option>
<option>Diarrhea</option>
<option>Constipation</option>
<option>Alternating constipation and diarrhea</option>
</select>

</div>

<div class="section">

<h2>Urination</h2>

<select id="urination">
<option>Normal</option>
<option>Frequent urination</option>
<option>Night urination</option>
<option>Dark urine</option>
<option>Clear abundant urine</option>
</select>

</div>

<div class="section">

<h2>Emotional State</h2>

<select id="emotion">
<option>Calm</option>
<option>Stress or anxiety</option>
<option>Irritable</option>
<option>Sadness</option>
<option>Mood swings</option>
</select>

</div>

<div class="section">

<h2>Pain</h2>

<select id="pain">
<option>No pain</option>
<option>Dull pain</option>
<option>Sharp stabbing pain</option>
<option>Moving pain</option>
<option>Tension or tightness</option>
</select>

</div>

<div class="section">

<h2>Sleep</h2>

<select id="sleep">
<option>Sleep well</option>
<option>Difficulty falling asleep</option>
<option>Wake frequently</option>
<option>Wake between 1-3 AM</option>
<option>Night sweats during sleep</option>
</select>

</div>

<div class="section">

<h2>Thirst</h2>

<select id="thirst">
<option>No thirst</option>
<option>Occasional thirst</option>
<option>Frequent thirst</option>
<option>Prefer cold drinks</option>
<option>Prefer warm drinks</option>
</select>

</div>

<button type="button" onclick="analyze()">Submit Intake</button>

</form>

<div id="result" class="result" style="display:none"></div>

<script>

function analyze(){

let liver=0
let spleen=0
let kidneyYang=0
let kidneyYin=0

let temp=document.getElementById("temperature").value
let energy=document.getElementById("energy").value
let appetite=document.getElementById("appetite").value
let bloating=document.getElementById("bloating").value
let bowel=document.getElementById("bowel").value
let emotion=document.getElementById("emotion").value
let pain=document.getElementById("pain").value
let sleep=document.getElementById("sleep").value

if(emotion=="Irritable" || pain=="Tension or tightness") liver++

if(appetite=="Poor appetite" || bloating=="Often" || bowel=="Loose stools") spleen++

if(temp=="Often cold" || energy=="Very weak") kidneyYang++

if(temp=="Night sweats" || sleep=="Night sweats during sleep") kidneyYin++

let result=""

if(liver>=2){
result+=`
<h2>Liver Qi Stagnation</h2>

Example acupuncture points:

LV3 – Taichong  
LI4 – Hegu  
GB34 – Yanglingquan  
PC6 – Neiguan
`
}

if(spleen>=2){
result+=`
<h2>Spleen Qi Deficiency</h2>

Example acupuncture points:

ST36 – Zusanli  
SP6 – Sanyinjiao  
CV12 – Zhongwan  
BL20 – Pishu
`
}

if(kidneyYang>=2){
result+=`
<h2>Kidney Yang Deficiency</h2>

Example acupuncture points:

KD3 – Taixi  
BL23 – Shenshu  
DU4 – Mingmen  
CV4 – Guanyuan
`
}

if(kidneyYin>=2){
result+=`
<h2>Kidney Yin Deficiency</h2>

Example acupuncture points:

KD6  
SP6  
KI3  
REN4
`
}

if(result==""){
result="<h2>No clear pattern detected. A full consultation is recommended.</h2>"
}

result+=`

<hr>

<h3>Important Notice</h3>

<p>

These impressions are generated automatically based on the answers you provided and are intended for educational purposes only.

They do not constitute a medical diagnosis or treatment plan.

Traditional Chinese Medicine diagnosis requires in-person evaluation including tongue observation, pulse palpation, and clinical assessment by a licensed acupuncture or TCM practitioner.

Please schedule an appointment for a comprehensive consultation and personalized acupuncture treatment plan.

</p>

<hr>

<h3>Contact CHORDS & CHI</h3>

<p>

Website:<br>
<a href="https://chordsandchi.com" target="_blank">https://chordsandchi.com</a>

<br><br>

Email:<br>
info@chordsandchi.com

<br><br>

Location:<br>
Makati / Laguna Area – Philippines

</p>

`

document.getElementById("result").innerHTML=result
document.getElementById("result").style.display="block"


const data={
email:document.getElementById("email").value,
name:document.getElementById("name").value,
dob:document.getElementById("dob").value,
contact:document.getElementById("contact").value,
address:document.getElementById("address").value,
gender:document.getElementById("gender").value,
occupation:document.getElementById("occupation").value,
concern:document.getElementById("concern").value,
temperature:temp,
energy,
appetite,
bloating,
bowel,
emotion,
pain,
sleep,
pattern:result
}

fetch("https://script.google.com/macros/s/AKfycbxs6hnnBihs9C5FfxavmOsnJ06nL2bD9Yxy4s_6JRhYaWwaIe0aSTy_qhkqgQH_8Uu8/exec",{
method:"POST",
body:JSON.stringify(data)
})

}

</script>

</body>
</html>
