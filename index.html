<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CHORDS & CHI – TCM Intake</title>

<style>

body{
font-family:Arial;
max-width:900px;
margin:auto;
padding:20px;
background:#f4f4f4;
}

.section{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:8px;
}

input,select,textarea{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:15px;
}

button{
padding:12px;
font-size:16px;
background:#2c4c4c;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.result{
background:#e8f5e9;
padding:20px;
margin-top:20px;
border-radius:8px;
}

</style>

</head>

<body>

<h1>CHORDS & CHI – Acupuncture Intake</h1>

<form>

<div class="section">

<h2>Patient Information</h2>

Email
<input id="email">

Name
<input id="name">

Date of Birth
<input id="dob">

Contact
<input id="contact">

Address
<textarea id="address"></textarea>

Gender
<input id="gender">

Occupation
<input id="occupation">

</div>


<div class="section">

<h2>Main Health Concern</h2>

<textarea id="concern"></textarea>

</div>


<div class="section">

<h2>Body Temperature</h2>

<select id="temperature">
<option value="">Select</option>
<option>Cold</option>
<option>Hot</option>
<option>Both</option>
</select>

</div>


<div class="section">

<h2>Appetite</h2>

<select id="appetite">
<option>Poor</option>
<option>Normal</option>
<option>Strong</option>
</select>

</div>


<div class="section">

<h2>Sweating</h2>

<select id="sweat">
<option>Normal</option>
<option>Excessive</option>
<option>Very little</option>
</select>

</div>


<div class="section">

<h2>Urination</h2>

<textarea id="urination"></textarea>

</div>


<div class="section">

<h2>Bowel Movements</h2>

<textarea id="bowel"></textarea>

</div>


<div class="section">

<h2>Pain</h2>

<textarea id="pain"></textarea>

</div>


<div class="section">

<h2>Sleep</h2>

<textarea id="sleep"></textarea>

</div>


<div class="section">

<h2>Energy</h2>

<textarea id="energy"></textarea>

</div>


<div class="section">

<h2>Stress or Emotional Concerns</h2>

<textarea id="stress"></textarea>

</div>


<button type="button" onclick="analyze()">Submit Intake</button>

</form>


<div id="result" class="result" style="display:none"></div>


<script>

function analyze(){

let liver=0
let spleen=0
let kidneyYang=0
let kidneyYin=0
let bloodDef=0
let damp=0
let phlegm=0
let liverYang=0

let temperature=document.getElementById("temperature").value
let appetite=document.getElementById("appetite").value
let energy=document.getElementById("energy").value.toLowerCase()
let stress=document.getElementById("stress").value.toLowerCase()
let pain=document.getElementById("pain").value.toLowerCase()


if(stress.includes("stress")||stress.includes("irritable")) liver++
if(pain.includes("tension")||pain.includes("rib")) liver++

if(appetite=="Poor") spleen++
if(energy.includes("tired")) spleen++

if(temperature=="Cold") kidneyYang++
if(energy.includes("low")) kidneyYang++

if(temperature=="Hot") kidneyYin++
if(document.getElementById("sleep").value.includes("night")) kidneyYin++

if(energy.includes("weak")) bloodDef++

if(document.getElementById("bowel").value.includes("loose")) damp++

if(document.getElementById("urination").value.includes("cloudy")) phlegm++

if(document.getElementById("pain").value.includes("headache")) liverYang++


let result=""


if(liver>=2){

result+=`

<h2>Liver Qi Stagnation</h2>

Example acupuncture points:

LV3 – Taichong  
LI4 – Hegu  
GB34 – Yanglingquan  
PC6 – Neiguan

`

}

if(spleen>=2){

result+=`

<h2>Spleen Qi Deficiency</h2>

Example acupuncture points:

ST36 – Zusanli  
SP6 – Sanyinjiao  
CV12 – Zhongwan  
BL20 – Pishu

`

}

if(kidneyYang>=2){

result+=`

<h2>Kidney Yang Deficiency</h2>

Example acupuncture points:

KD3 – Taixi  
BL23 – Shenshu  
DU4 – Mingmen  
CV4 – Guanyuan

`

}

if(kidneyYin>=2){

result+=`

<h2>Kidney Yin Deficiency</h2>

Example acupuncture points:

KD6  
SP6  
REN4  
KI3

`

}

if(liverYang>=2){

result+=`

<h2>Liver Yang Rising</h2>

Example acupuncture points:

LV3  
GB20  
KD3  
LI4

`

}

if(result==""){

result="<h2>No strong pattern detected. A full consultation is recommended.</h2>"

}

result+=`

<hr>

<p style="font-size:14px">

These impressions are generated automatically based on the answers you provided and are intended for educational purposes only.

They do not constitute a medical diagnosis or treatment plan.

Traditional Chinese Medicine diagnosis requires in-person evaluation including tongue observation, pulse palpation, and clinical assessment by a licensed acupuncture or TCM practitioner.

Please schedule an appointment for a comprehensive consultation and personalized acupuncture treatment plan.

</p>

`

document.getElementById("result").innerHTML=result
document.getElementById("result").style.display="block"



const data={

email:document.getElementById("email").value,
name:document.getElementById("name").value,
dob:document.getElementById("dob").value,
contact:document.getElementById("contact").value,
address:document.getElementById("address").value,
gender:document.getElementById("gender").value,
occupation:document.getElementById("occupation").value,
concern:document.getElementById("concern").value,
temperature,
appetite,
sweat:document.getElementById("sweat").value,
urination:document.getElementById("urination").value,
bowel:document.getElementById("bowel").value,
pain,
sleep:document.getElementById("sleep").value,
energy,
stress,
pattern:result

}

fetch("https://script.google.com/macros/s/AKfycbxs6hnnBihs9C5FfxavmOsnJ06nL2bD9Yxy4s_6JRhYaWwaIe0aSTy_qhkqgQH_8Uu8/exec",{
method:"POST",
body:JSON.stringify(data)
})

}

</script>

</body>
</html>
