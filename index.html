<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TCM Self-Assessment Intake</title>

<style>

body{
font-family:Arial;
max-width:800px;
margin:auto;
padding:20px;
background:#f5f5f5;
}

.section{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:8px;
}

h1{
color:#2c4c4c;
}

button{
padding:12px;
font-size:16px;
background:#2c4c4c;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.result{
background:#e8f5e9;
padding:20px;
border-radius:8px;
margin-top:20px;
}

</style>

</head>


<body>

<h1>Traditional Chinese Medicine Self-Assessment</h1>

<p>
Complete the questions below to explore possible Traditional Chinese Medicine patterns.
</p>

<form id="form">


<div class="section">

<h2>Energy</h2>

<select id="energy">
<option value="">Select</option>
<option value="low">Persistent fatigue</option>
<option value="crash">Fatigue after eating</option>
<option value="normal">Normal energy</option>
</select>

</div>


<div class="section">

<h2>Digestion</h2>

<select id="digestion">
<option value="">Select</option>
<option value="bloating">Bloating after meals</option>
<option value="loose">Loose stools</option>
<option value="normal">Normal digestion</option>
</select>

</div>


<div class="section">

<h2>Stress / Emotional State</h2>

<select id="stress">
<option value="">Select</option>
<option value="irritable">Irritable / frustrated</option>
<option value="anxious">Anxious</option>
<option value="calm">Calm</option>
</select>

</div>


<div class="section">

<h2>Sleep</h2>

<select id="sleep">
<option value="">Select</option>
<option value="13am">Wake between 1-3 AM</option>
<option value="insomnia">Difficulty sleeping</option>
<option value="good">Sleep well</option>
</select>

</div>


<div class="section">

<h2>Temperature</h2>

<select id="temp">
<option value="">Select</option>
<option value="cold">Often feel cold</option>
<option value="hot">Often feel hot</option>
<option value="normal">Normal</option>
</select>

</div>


<div class="section">

<h2>Pain / Body Tension</h2>

<select id="pain">
<option value="">Select</option>
<option value="neck">Neck / shoulder tension</option>
<option value="headache">Frequent headaches</option>
<option value="none">None</option>
</select>

</div>


<button type="button" onclick="analyze()">Generate TCM Insight</button>

</form>



<div id="result" class="result" style="display:none"></div>



<script>

function analyze(){

let liver=0
let spleen=0
let kidney=0


let energy=document.getElementById("energy").value
let digestion=document.getElementById("digestion").value
let stress=document.getElementById("stress").value
let sleep=document.getElementById("sleep").value
let temp=document.getElementById("temp").value
let pain=document.getElementById("pain").value



/* Liver Qi Stagnation */

if(stress=="irritable") liver++
if(pain=="neck") liver++
if(sleep=="13am") liver++


/* Spleen Qi Deficiency */

if(energy=="low") spleen++
if(energy=="crash") spleen++
if(digestion=="bloating") spleen++
if(digestion=="loose") spleen++


/* Kidney Yang Deficiency */

if(temp=="cold") kidney++
if(energy=="low") kidney++



let output=""


if(liver>=2){

output+=`

<h2>Possible Pattern Tendency: Liver Qi Stagnation</h2>

Common indicators from your responses include stress sensitivity, muscular tension, and disrupted sleep patterns.

<h3>Example acupuncture points often used</h3>

<ul>
<li>LV3 – Taichong</li>
<li>LI4 – Hegu</li>
<li>GB34 – Yanglingquan</li>
<li>PC6 – Neiguan</li>
</ul>

`

}



if(spleen>=2){

output+=`

<h2>Possible Pattern Tendency: Spleen Qi Deficiency</h2>

Indicators may include fatigue, digestive bloating, and weakened digestion.

<h3>Example acupuncture points often used</h3>

<ul>
<li>ST36 – Zusanli</li>
<li>SP6 – Sanyinjiao</li>
<li>CV12 – Zhongwan</li>
<li>BL20 – Pishu</li>
</ul>

`

}



if(kidney>=2){

output+=`

<h2>Possible Pattern Tendency: Kidney Yang Deficiency</h2>

Common indicators may include low vitality and sensitivity to cold.

<h3>Example acupuncture points often used</h3>

<ul>
<li>KD3 – Taixi</li>
<li>BL23 – Shenshu</li>
<li>CV4 – Guanyuan</li>
<li>DU4 – Mingmen</li>
</ul>

`

}



if(output==""){

output="<h2>No clear pattern detected from the answers.</h2><p>A full consultation may reveal more specific diagnostic patterns.</p>"

}



output+=`

<hr>

<p style="font-size:14px;color:#555">

These impressions are generated automatically based on the answers you provided and are intended for educational purposes only.

They do not constitute a medical diagnosis or treatment plan.

Traditional Chinese Medicine diagnosis requires in-person evaluation including tongue observation, pulse palpation, and clinical assessment by a licensed acupuncture or TCM practitioner.

Please schedule an appointment for a comprehensive consultation and personalized acupuncture treatment plan.

</p>

`



document.getElementById("result").innerHTML=output
document.getElementById("result").style.display="block"


/* SEND DATA TO GOOGLE SHEET */

const data = {
energy,
digestion,
stress,
sleep,
temp,
pain,
pattern: output
}

fetch("https://script.google.com/macros/s/AKfycbxs6hnnBihs9C5FfxavmOsnJ06nL2bD9Yxy4s_6JRhYaWwaIe0aSTy_qhkqgQH_8Uu8/exec", {
method: "POST",
body: JSON.stringify(data)
})

}

</script>
