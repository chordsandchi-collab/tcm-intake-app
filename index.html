<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CHORDS & CHI Intake</title>

<style>

body{
font-family:Arial;
max-width:900px;
margin:auto;
padding:20px;
background:#f4f4f4;
}

.section{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:8px;
}

select,input,textarea{
width:100%;
padding:8px;
margin-bottom:15px;
}

button{
padding:12px;
font-size:16px;
background:#2c4c4c;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.result{
background:#e8f5e9;
padding:20px;
margin-top:20px;
border-radius:8px;
}

</style>

</head>

<body>

<h1>CHORDS & CHI – TCM Intake</h1>

<form>

<div class="section">

<h2>Patient Information</h2>

Email
<input id="email">

Name
<input id="name">

Date of Birth
<input id="dob">

Contact
<input id="contact">

Address
<textarea id="address"></textarea>

Gender
<input id="gender">

Occupation
<input id="occupation">

</div>


<div class="section">

<h2>Main Health Concern</h2>

<textarea id="concern"></textarea>

</div>


<div class="section">

<h2>Body Temperature</h2>

<select id="temperature">
<option>Normal</option>
<option>Often cold</option>
<option>Cold hands and feet</option>
<option>Often hot</option>
<option>Night sweats</option>
<option>Alternating hot and cold</option>
</select>

</div>


<div class="section">

<h2>Energy</h2>

<select id="energy">
<option>Strong</option>
<option>Low energy</option>
<option>Energy crash afternoon</option>
<option>Fatigue after eating</option>
<option>Very weak</option>
</select>

</div>


<div class="section">

<h2>Appetite</h2>

<select id="appetite">
<option>Normal appetite</option>
<option>Poor appetite</option>
<option>Strong appetite</option>
<option>Hungry but cannot eat much</option>
</select>

</div>


<div class="section">

<h2>Bloating After Meals</h2>

<select id="bloating">
<option>No</option>
<option>Sometimes</option>
<option>Often</option>
<option>Severe</option>
</select>

</div>


<div class="section">

<h2>Bowel Movements</h2>

<select id="bowel">
<option>Normal</option>
<option>Loose stools</option>
<option>Diarrhea</option>
<option>Constipation</option>
<option>Alternating constipation and diarrhea</option>
</select>

</div>


<div class="section">

<h2>Urination</h2>

<select id="urination">
<option>Normal</option>
<option>Frequent urination</option>
<option>Night urination</option>
<option>Dark urine</option>
<option>Clear abundant urine</option>
</select>

</div>


<div class="section">

<h2>Emotional State</h2>

<select id="emotion">
<option>Calm</option>
<option>Stress or anxiety</option>
<option>Irritable</option>
<option>Sadness</option>
<option>Mood swings</option>
</select>

</div>


<div class="section">

<h2>Pain Type</h2>

<select id="pain">
<option>No pain</option>
<option>Dull pain</option>
<option>Sharp stabbing pain</option>
<option>Moving pain</option>
<option>Tension tightness</option>
</select>

</div>


<div class="section">

<h2>Sleep</h2>

<select id="sleep">
<option>Sleep well</option>
<option>Difficulty falling asleep</option>
<option>Wake frequently</option>
<option>Wake 1-3 AM</option>
<option>Night sweats</option>
</select>

</div>


<button type="button" onclick="analyze()">Submit Intake</button>

</form>


<div id="result" class="result" style="display:none"></div>


<script>

function analyze(){

let liver=0
let spleen=0
let kidneyYang=0
let kidneyYin=0

let temp=document.getElementById("temperature").value
let energy=document.getElementById("energy").value
let appetite=document.getElementById("appetite").value
let bloating=document.getElementById("bloating").value
let bowel=document.getElementById("bowel").value
let emotion=document.getElementById("emotion").value
let pain=document.getElementById("pain").value
let sleep=document.getElementById("sleep").value
let urine=document.getElementById("urination").value


if(emotion=="Irritable") liver+=2
if(emotion=="Mood swings") liver+=1
if(pain=="Tension tightness") liver+=2
if(sleep=="Wake 1-3 AM") liver+=1


if(appetite=="Poor appetite") spleen+=2
if(bloating=="Often") spleen+=2
if(bowel=="Loose stools") spleen+=2
if(energy=="Fatigue after eating") spleen+=2


if(temp=="Often cold") kidneyYang+=2
if(temp=="Cold hands and feet") kidneyYang+=1
if(energy=="Very weak") kidneyYang+=2
if(urine=="Night urination") kidneyYang+=1


if(temp=="Night sweats") kidneyYin+=2
if(sleep=="Night sweats") kidneyYin+=1


let patterns=[
{name:"Liver Qi Stagnation",score:liver,points:"LV3, LI4, GB34, PC6"},
{name:"Spleen Qi Deficiency",score:spleen,points:"ST36, SP6, CV12, BL20"},
{name:"Kidney Yang Deficiency",score:kidneyYang,points:"KD3, BL23, DU4, CV4"},
{name:"Kidney Yin Deficiency",score:kidneyYin,points:"KD6, SP6, KI3, REN4"}
]

patterns.sort((a,b)=>b.score-a.score)

let result="<h2>Pattern Tendencies</h2>"

for(let i=0;i<3;i++){
result+=`<p><b>${patterns[i].name}</b> – Score ${patterns[i].score}<br>
Example acupuncture points: ${patterns[i].points}</p>`
}


result+=`

<hr>

<h3>Important Notice</h3>

<p>

These impressions are generated automatically based on the answers you provided and are intended for educational purposes only.

They do not constitute a medical diagnosis or treatment plan.

Traditional Chinese Medicine diagnosis requires in-person evaluation including tongue observation, pulse palpation, and clinical assessment by a licensed acupuncture practitioner.

Please schedule an appointment for a full consultation.

</p>

<hr>

<h3>Contact CHORDS & CHI</h3>

<p>

Phone / Viber / WhatsApp / Telegram<br>
<b>0916-829-8698</b>

<br><br>

Website<br>
<a href="https://chordsandchi.com" target="_blank">chordsandchi.com</a>

<br><br>

Locations<br>

Mandaluyong  
Marikina  
Quezon City  
Laguna – Philippines

</p>

`

document.getElementById("result").innerHTML=result
document.getElementById("result").style.display="block"



const data={
email:document.getElementById("email").value,
name:document.getElementById("name").value,
dob:document.getElementById("dob").value,
contact:document.getElementById("contact").value,
address:document.getElementById("address").value,
gender:document.getElementById("gender").value,
occupation:document.getElementById("occupation").value,
concern:document.getElementById("concern").value,
temperature:temp,
energy,
appetite,
bloating,
bowel,
emotion,
pain,
sleep,
pattern:result
}

fetch("https://script.google.com/macros/s/AKfycbxVXBIEJEcJz8WhvTmESqX3OkmQMjZ7U-iVh7WvDydWWMfnaNdxIcaZtKbwy632meMk/exec",{
method:"POST",
body:JSON.stringify(data)
})

}

</script>

</body>
</html>
