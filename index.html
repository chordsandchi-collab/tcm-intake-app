<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TCM Patient Intake</title>

<style>

body{
font-family:Arial;
max-width:900px;
margin:auto;
padding:20px;
background:#f5f5f5;
}

.section{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:8px;
}

h1{
color:#2c4c4c;
}

button{
padding:12px;
font-size:16px;
background:#2c4c4c;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.result{
background:#e8f5e9;
padding:20px;
border-radius:8px;
margin-top:20px;
}

</style>

</head>


<body>

<h1>TCM Patient Intake & Self-Assessment</h1>

<p>Please complete this intake questionnaire before your consultation.</p>

<form id="form">

<div class="section">

<h2>Patient Information</h2>

Name<br>
<input id="name"><br><br>

Age<br>
<input id="age"><br><br>

Phone<br>
<input id="phone"><br><br>

Chief Complaint<br>
<textarea id="complaint"></textarea>

</div>


<div class="section">

<h2>Energy</h2>

<select id="energy">
<option value="">Select</option>
<option value="low">Persistent fatigue</option>
<option value="crash">Fatigue after eating</option>
<option value="normal">Normal energy</option>
</select>

</div>


<div class="section">

<h2>Digestion</h2>

<select id="digestion">
<option value="">Select</option>
<option value="bloating">Bloating after meals</option>
<option value="loose">Loose stools</option>
<option value="normal">Normal digestion</option>
</select>

</div>


<div class="section">

<h2>Stress / Emotional State</h2>

<select id="stress">
<option value="">Select</option>
<option value="irritable">Irritable / frustrated</option>
<option value="anxious">Anxious</option>
<option value="calm">Calm</option>
</select>

</div>


<div class="section">

<h2>Sleep</h2>

<select id="sleep">
<option value="">Select</option>
<option value="13am">Wake between 1-3 AM</option>
<option value="insomnia">Difficulty sleeping</option>
<option value="good">Sleep well</option>
</select>

</div>


<div class="section">

<h2>Temperature Sensation</h2>

<select id="temp">
<option value="">Select</option>
<option value="cold">Often feel cold</option>
<option value="hot">Often feel hot</option>
<option value="normal">Normal</option>
</select>

</div>


<div class="section">

<h2>Pain / Body Tension</h2>

<select id="pain">
<option value="">Select</option>
<option value="neck">Neck / shoulder tension</option>
<option value="headache">Frequent headaches</option>
<option value="none">None</option>
</select>

</div>


<button type="button" onclick="analyze()">Submit Intake</button>

</form>


<div id="result" class="result" style="display:none"></div>


<script>

function analyze(){

let liver=0
let spleen=0
let kidney=0

let name=document.getElementById("name").value
let age=document.getElementById("age").value
let phone=document.getElementById("phone").value
let complaint=document.getElementById("complaint").value

let energy=document.getElementById("energy").value
let digestion=document.getElementById("digestion").value
let stress=document.getElementById("stress").value
let sleep=document.getElementById("sleep").value
let temp=document.getElementById("temp").value
let pain=document.getElementById("pain").value


if(stress=="irritable") liver++
if(pain=="neck") liver++
if(sleep=="13am") liver++

if(energy=="low") spleen++
if(energy=="crash") spleen++
if(digestion=="bloating") spleen++
if(digestion=="loose") spleen++

if(temp=="cold") kidney++
if(energy=="low") kidney++

let output=""

if(liver>=2){

output+=`
<h2>Possible Pattern: Liver Qi Stagnation</h2>

Example acupuncture points:

LV3 – Taichong  
LI4 – Hegu  
GB34 – Yanglingquan  
PC6 – Neiguan
`

}

if(spleen>=2){

output+=`
<h2>Possible Pattern: Spleen Qi Deficiency</h2>

Example acupuncture points:

ST36 – Zusanli  
SP6 – Sanyinjiao  
CV12 – Zhongwan  
BL20 – Pishu
`

}

if(kidney>=2){

output+=`
<h2>Possible Pattern: Kidney Yang Deficiency</h2>

Example acupuncture points:

KD3 – Taixi  
BL23 – Shenshu  
DU4 – Mingmen  
CV4 – Guanyuan
`

}

if(output==""){
output="<h2>No strong pattern detected.</h2>"
}

output+=`

<hr>

<p>

These impressions are generated automatically based on the answers you provided and are intended for educational purposes only.

They do not constitute a medical diagnosis or treatment plan.

Traditional Chinese Medicine diagnosis requires in-person evaluation including tongue observation, pulse palpation, and clinical assessment by a licensed acupuncture or TCM practitioner.

Please schedule an appointment for a comprehensive consultation and personalized acupuncture treatment plan.

</p>
`

document.getElementById("result").innerHTML=output
document.getElementById("result").style.display="block"


const data={
name,
age,
phone,
complaint,
energy,
digestion,
stress,
sleep,
temp,
pain,
pattern:output
}


fetch("https://script.google.com/macros/s/AKfycbxs6hnnBihs9C5FfxavmOsnJ06nL2bD9Yxy4s_6JRhYaWwaIe0aSTy_qhkqgQH_8Uu8/exec",{
method:"POST",
body:JSON.stringify(data)
})

}

</script>

</body>
</html>
